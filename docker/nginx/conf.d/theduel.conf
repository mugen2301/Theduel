map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream next_frontend {
    server frontend:3000;
}

upstream laravel_fpm {
    server backend:9000;
}

server {
    listen 80;
    server_name www.theduel.in theduel.in app.theduel.in dealer.theduel.in erp.theduel.in api.theduel.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.theduel.in theduel.in app.theduel.in dealer.theduel.in erp.theduel.in;

    ssl_certificate /etc/letsencrypt/live/theduel.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theduel.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://next_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl http2;
    server_name api.theduel.in;

    root /var/www/html/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/theduel.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theduel.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_pass laravel_fpm;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
